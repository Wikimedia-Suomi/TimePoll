name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      TIMEPOLL_SECRET_KEY: ci-timepoll-secret-key
      TIMEPOLL_DEBUG: "0"
      TIMEPOLL_ALLOWED_HOSTS: 127.0.0.1,localhost,testserver,[::1]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install runtime and dev dependencies
        run: |
          python -m pip install --upgrade pip
          make install-dev PYTHON=python PIP=pip

      - name: Install Playwright browsers
        run: make install-browser PYTHON=python PLAYWRIGHT_INSTALL_ARGS="--with-deps chromium"

      - name: Ruff
        run: make lint PYTHON=python

      - name: MyPy
        run: make typecheck PYTHON=python

      - name: Bandit
        run: make security PYTHON=python

      - name: pip-audit
        run: make audit PYTHON=python

      - name: Coverage + Django + browser tests
        run: make coverage PYTHON=python

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
