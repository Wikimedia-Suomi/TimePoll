[tool.ruff]
target-version = "py313"
line-length = 100
extend-exclude = ["polls/migrations"]

[tool.ruff.lint]
select = ["B", "E", "F", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"manage.py" = ["E402"]

[tool.mypy]
python_version = "3.13"
ignore_missing_imports = true
check_untyped_defs = true
exclude = ["polls/migrations/.*"]
warn_redundant_casts = true
warn_unused_ignores = true

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "timepoll.settings"
python_files = ["tests.py", "test_*.py", "*_tests.py"]
testpaths = ["polls"]
addopts = "-ra"

[tool.coverage.run]
branch = true
concurrency = ["thread"]
source = ["polls", "timepoll"]

[tool.coverage.report]
show_missing = true
skip_covered = false
omit = [
  "polls/migrations/*",
  "polls/tests*.py",
]
exclude_also = [
  "pragma: no cover",
  "if TYPE_CHECKING:",
]
